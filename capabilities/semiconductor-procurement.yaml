naftiko: 1.0.0-alpha2
info:
  label: Texas Instruments Semiconductor Procurement
  description: Unified semiconductor procurement capability for electronics engineers, procurement teams, and supply chain
    managers. Combines TI's Store API and Product Information API to enable part research, inventory checking, order placement,
    shipment tracking, and invoice retrieval from a single interface.
  tags:
  - Texas Instruments
  - Procurement
  - Supply Chain
  - Semiconductors
  - Ordering
  - Inventory
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TI_ACCESS_TOKEN: TI_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: ti-store
    baseUri: https://transact.ti.com/v2/store
    description: Texas Instruments store ordering and inventory API
    authentication:
      type: bearer
      token: '{{TI_ACCESS_TOKEN}}'
    resources:
    - name: products
      path: /products/{partNumber}
      description: Get inventory and pricing for a TI part
      operations:
      - name: get-product-inventory
        method: GET
        description: Get real-time inventory and pricing for a part number
        inputParameters:
        - name: partNumber
          in: path
          type: string
          required: true
          description: TI orderable part number
        - name: currency
          in: query
          type: string
          required: false
          description: 'Currency code (default: USD)'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: catalog
      path: /products/catalog
      description: Full product catalog
      operations:
      - name: get-catalog
        method: GET
        description: Get full product catalog with pricing (rate limited to 6/day)
        inputParameters:
        - name: currency
          in: query
          type: string
          required: false
          description: Currency code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders
      path: /orders
      description: Create store orders
      operations:
      - name: create-order
        method: POST
        description: Create a new TI store order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            checkoutProfileId: '{{tools.checkoutProfileId}}'
            customerPurchaseOrderNumber: '{{tools.poNumber}}'
            lineItems: '{{tools.lineItems}}'
    - name: order
      path: /orders/{orderNumber}
      description: Retrieve order details
      operations:
      - name: get-order
        method: GET
        description: Get order status and details
        inputParameters:
        - name: orderNumber
          in: path
          type: string
          required: true
          description: TI order number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: asn
      path: /advanced-ship-notices
      description: Shipment tracking via ASN
      operations:
      - name: get-ship-notices
        method: GET
        description: Get advanced ship notice for an order
        inputParameters:
        - name: orderNumber
          in: query
          type: string
          required: true
          description: TI order number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: financial-documents
      path: /financial-documents
      description: Invoice and financial document retrieval
      operations:
      - name: get-financial-documents
        method: GET
        description: Get invoices for an order
        inputParameters:
        - name: orderNumber
          in: query
          type: string
          required: false
          description: TI order number
        - name: financialDocumentNumber
          in: query
          type: string
          required: false
          description: Financial document number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: ti-product-info
    baseUri: https://transact.ti.com/v1
    description: Texas Instruments product information and parametric data API
    authentication:
      type: bearer
      token: '{{TI_ACCESS_TOKEN}}'
    resources:
    - name: products
      path: /products/{partNumber}
      description: Get product details and parametric data
      operations:
      - name: get-product-information
        method: GET
        description: Get basic product details and parametric data (3000/day limit)
        inputParameters:
        - name: partNumber
          in: path
          type: string
          required: true
          description: TI part number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-extended
      path: /products-extended/{partNumber}
      description: Get comprehensive product data including quality/reliability
      operations:
      - name: get-product-information-extended
        method: GET
        description: Get comprehensive product data including quality/reliability (1500/day limit)
        inputParameters:
        - name: partNumber
          in: path
          type: string
          required: true
          description: TI part number
        - name: page
          in: query
          type: integer
          required: false
          description: Page number (0-indexed)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: ti-procurement-api
    description: Unified REST API for TI semiconductor procurement workflows.
    resources:
    - path: /v1/products/{partNumber}
      name: product
      description: TI part lookup with inventory, pricing, and specifications
      operations:
      - method: GET
        name: get-product-inventory
        description: Get inventory and pricing for a TI part number
        call: ti-store.get-product-inventory
        with:
          partNumber: rest.partNumber
          currency: rest.currency
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{partNumber}/specs
      name: product-specs
      description: TI part technical specifications and parametric data
      operations:
      - method: GET
        name: get-product-specs
        description: Get parametric and technical specifications
        call: ti-product-info.get-product-information
        with:
          partNumber: rest.partNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{partNumber}/quality
      name: product-quality
      description: TI part quality and reliability certifications
      operations:
      - method: GET
        name: get-product-quality
        description: Get quality certifications and reliability data
        call: ti-product-info.get-product-information-extended
        with:
          partNumber: rest.partNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/catalog
      name: catalog
      description: Full TI product catalog
      operations:
      - method: GET
        name: get-catalog
        description: Get full product catalog
        call: ti-store.get-catalog
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders
      name: orders
      description: TI store order management
      operations:
      - method: POST
        name: create-order
        description: Place a new order
        call: ti-store.create-order
        with:
          checkoutProfileId: rest.checkoutProfileId
          poNumber: rest.poNumber
          lineItems: rest.lineItems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderNumber}
      name: order
      description: Order status and details
      operations:
      - method: GET
        name: get-order
        description: Get order details
        call: ti-store.get-order
        with:
          orderNumber: rest.orderNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/shipments
      name: shipments
      description: Shipment tracking via ASN
      operations:
      - method: GET
        name: get-shipments
        description: Get shipment tracking information
        call: ti-store.get-ship-notices
        with:
          orderNumber: rest.orderNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices
      name: invoices
      description: Financial documents and invoices
      operations:
      - method: GET
        name: get-invoices
        description: Get invoices for an order
        call: ti-store.get-financial-documents
        with:
          orderNumber: rest.orderNumber
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: ti-procurement-mcp
    transport: http
    description: MCP server for AI-assisted TI semiconductor procurement.
    tools:
    - name: get-product-inventory
      description: Get real-time inventory availability and pricing breaks for a TI part number
      hints:
        readOnly: true
        openWorld: false
      call: ti-store.get-product-inventory
      with:
        partNumber: tools.partNumber
        currency: tools.currency
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-specifications
      description: Get technical parametric specifications for a TI semiconductor part
      hints:
        readOnly: true
        openWorld: false
      call: ti-product-info.get-product-information
      with:
        partNumber: tools.partNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-quality-certifications
      description: Get quality certifications (RoHS, AEC-Q100, MSL) and reliability data for a TI part
      hints:
        readOnly: true
        openWorld: false
      call: ti-product-info.get-product-information-extended
      with:
        partNumber: tools.partNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: place-order
      description: Place a new order for TI semiconductors with specified line items
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ti-store.create-order
      with:
        checkoutProfileId: tools.checkoutProfileId
        poNumber: tools.poNumber
        lineItems: tools.lineItems
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order-status
      description: Check the status and details of a placed TI order
      hints:
        readOnly: true
        openWorld: false
      call: ti-store.get-order
      with:
        orderNumber: tools.orderNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: track-shipment
      description: Get shipment tracking information and carrier details for a TI order
      hints:
        readOnly: true
        openWorld: false
      call: ti-store.get-ship-notices
      with:
        orderNumber: tools.orderNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: get-invoices
      description: Retrieve invoices and financial documents for a TI order
      hints:
        readOnly: true
        openWorld: false
      call: ti-store.get-financial-documents
      with:
        orderNumber: tools.orderNumber
      outputParameters:
      - type: object
        mapping: $.
