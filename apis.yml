apis:
  - aid: texas-instruments:ti-store-api
    name: Texas Instruments Store API
    description: >-
      The TI Store API enables enterprise customers to integrate with TI's
      ordering platform. It provides real-time inventory and pricing data,
      order creation and retrieval, advanced ship notice (ASN) tracking, and
      financial document retrieval. OAuth 2.0 client credentials authentication
      against transact.ti.com. Production base URL: https://transact.ti.com/v2/store
    humanURL: https://www.ti.com/developer-api/store-api/getting-started.html
    baseURL: https://transact.ti.com/v2/store
    tags:
      - Inventory
      - Ordering
      - Semiconductors
      - Supply Chain
    properties:
      - type: Documentation
        url: https://www.ti.com/developer-api/store-api/getting-started.html
      - type: OpenAPI
        url: openapi/texas-instruments-store-openapi.yml
      - type: Portal
        url: https://api-portal.ti.com/
  - aid: texas-instruments:ti-product-information-api
    name: Texas Instruments Product Information API
    description: >-
      The TI Product Information API suite provides access to TI's semiconductor
      product catalog including parametric data, quality and reliability
      information. Available as standard (multiple calls, 3,000/day limit)
      and orchestrated (single call, 1,500/day limit) variants. Base URL:
      https://transact.ti.com/v1
    humanURL: https://www.ti.com/developer-api/product-information-api-suite/getting-started.html
    baseURL: https://transact.ti.com/v1
    tags:
      - Electronics
      - Product Data
      - Semiconductors
    properties:
      - type: Documentation
        url: https://www.ti.com/developer-api/product-information-api-suite/getting-started.html
      - type: OpenAPI
        url: openapi/texas-instruments-product-information-openapi.yml
      - type: Portal
        url: https://api-portal.ti.com/
