aid: texas-instruments
name: Texas Instruments
description: >-
  Texas Instruments is an American technology company that designs and
  manufactures semiconductors and various integrated circuits for industrial,
  automotive, personal electronics, communications equipment, and enterprise
  systems markets. TI provides a developer API portal at api-portal.ti.com
  offering Store APIs for inventory, ordering, and shipment tracking, as
  well as Product Information APIs for accessing parametric data, quality,
  and reliability information on TI's extensive semiconductor catalog.
